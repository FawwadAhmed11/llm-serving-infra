apiVersion: v1
kind: ConfigMap
metadata:
  name: vllm-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  vllm-dashboard.json: |
    {
      "title": "vLLM Inference",
      "panels": [
        {
          "title": "Requests per second",
          "type": "graph",
          "targets": [{"expr": "rate(http_requests_total[1m])"}]
        },
        {
          "title": "p99 latency",
          "type": "graph",
          "targets": [{"expr": "histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m]))"}]
        },
        {
          "title": "Pod CPU utilization",
          "type": "graph",
          "targets": [{"expr": "rate(container_cpu_usage_seconds_total{pod=~'vllm-mock.*'}[1m])"}]
        }
      ]
    }
